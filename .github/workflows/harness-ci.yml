name: Nightwalker CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  harness-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools
        run: |
          jq --version
          sudo apt-get update
          sudo apt-get install -y ripgrep
          rg --version

      - name: Install engine stubs for CI
        run: |
          mkdir -p .github/bin
          cat > .github/bin/codex <<'EOF'
          #!/usr/bin/env bash
          echo "codex stub (CI)"
          exit 0
          EOF
          cat > .github/bin/claude <<'EOF'
          #!/usr/bin/env bash
          echo "claude stub (CI)"
          exit 0
          EOF
          chmod +x .github/bin/codex .github/bin/claude
          echo "$PWD/.github/bin" >> "$GITHUB_PATH"

      - name: Run harness regression
        run: |
          chmod +x .claude/tests/harness-regression.sh
          .claude/tests/harness-regression.sh
